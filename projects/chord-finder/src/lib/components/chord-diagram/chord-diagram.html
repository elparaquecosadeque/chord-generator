<svg class="chord-svg" [attr.viewBox]="viewBox" role="img" [attr.aria-label]="title() + ' guitar chord diagram'">
  <title>{{ title() }} - posición {{ positionIndex() + 1 }} - {{ positionCode() }}</title>

  <rect class="card-bg" x="0" y="0" [attr.width]="width" [attr.height]="height" rx="24" fill="#ffffff" />

  <text x="120" y="50" text-anchor="middle" class="title">{{ title() }}</text>

  <g class="markers">
    @for (fret of position().frets; track $index) {
      <text [attr.x]="stringX($index)" y="92" text-anchor="middle">{{ markerFor(fret) }}</text>
    }
  </g>

  <text x="26" [attr.y]="fretY(0) + 28" text-anchor="middle" class="fret-number">{{ fretLabel() }}</text>

  <g class="grid">
    @for (line of fretLines(); track line) {
      <line
        [attr.x1]="stringX(0)"
        [attr.x2]="stringX(5)"
        [attr.y1]="fretY(line)"
        [attr.y2]="fretY(line)"
        [class.nut]="line === 0 && baseFret() === 1"
      />
    }

    @for (line of stringLines(); track line) {
      <line
        [attr.x1]="stringX(line)"
        [attr.x2]="stringX(line)"
        [attr.y1]="fretY(0)"
        [attr.y2]="fretY(fretCount())"
      />
    }
  </g>

  <g class="barres">
    @for (barre of barreSpans(); track barre.fret) {
      <rect
        [attr.x]="barre.x"
        [attr.y]="barre.y"
        [attr.width]="barre.width"
        [attr.height]="dotRadius * 2"
        rx="13"
      />
      @if (barre.finger) {
        <text [attr.x]="barre.labelX" [attr.y]="barre.labelY" text-anchor="middle">{{ barre.finger }}</text>
      }
    }
  </g>

  <g class="dots">
    @for (dot of visibleDots(); track dot.stringIndex) {
      <circle [attr.cx]="stringX(dot.stringIndex)" [attr.cy]="dotY(dot.fret)" [attr.r]="dotRadius" />
      @if (dot.finger) {
        <text [attr.x]="stringX(dot.stringIndex)" [attr.y]="dotY(dot.fret)" text-anchor="middle">{{ dot.finger }}</text>
      }
    }
  </g>

  <g class="string-labels">
    @for (label of stringLabels; track label + $index) {
      <text [attr.x]="stringX($index)" [attr.y]="fretY(fretCount()) + 32" text-anchor="middle">{{ label }}</text>
    }
  </g>
</svg>
